name: Weekly Channel Discovery

on:
  schedule:
    # Runs 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run channel discovery
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: uv run python -m app.scripts.discover_channels

      - name: Commit updated channel list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/channels.json
          git diff --staged --quiet || git commit -m "Update discovered YouTube channels"